name: expenzo
description: Expenzo - Personal Expense Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Navigation
  go_router: ^14.2.7

  # File system
  path_provider: ^2.1.4

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  flutter_slidable: ^3.1.1

  # Internationalisation / formatting
  intl: ^0.19.0

  # File handling / backup
  file_picker: ^10.3.3
  share_plus: ^10.0.2
  permission_handler: ^11.3.1

  # Utilities
  uuid: ^4.4.2
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#6C63FF"
  min_sdk_android: 21

